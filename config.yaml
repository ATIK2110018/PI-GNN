# ============================================================
# PIGNN Configuration
# Physics-Informed Graph Neural Network for Inverse Manning's n
# Sacramento River — Boundary-Driven / Data-Assimilation Mode
# (No HEC-RAS simulation results available; driven by real gauge
#  observations at Butte City (BTC) + Ord Ferry + Colusa BCs)
# ============================================================

geometry:
  hdf_path: "data/hecras/sacramento_2/Geometries/Geometry.h5"
  results_hdf: null           # no simulation results — boundary-driven training
  bathy_tif: "data/hecras/sacramento_2/Terrains/Terrain.sacramento_bathy.tif"
  area_name: null             # auto-detect from HDF5
  max_cells: null             # null = use all cells

data:
  discharge_csv: "data/ord_ferry_discharge_jan2026.csv"
  downstream_stage_csv: "data/colusa_stage_jan2026.csv"
  obs_csv: "data/BTC_stage_data_Jan2026.csv"
  val_fraction: 0.1
  dt: 3600.0                  # seconds between time steps (hourly for January 2026)
  t_start: 0.0
  t_end: 2678400.0            # 744 hours = 31 days (January 2026)

model:
  hidden_dim: 64
  n_message_passing: 4        # number of GNN message passing layers
  n_heads: 4                  # attention heads (for GAT)
  dropout: 0.0
  n_min: 0.020
  n_max: 0.080
  n_init: 0.035
  architecture: "encoder_process_decode"   # or "gat"
  use_checkpoint: true        # trade compute for VRAM to prevent OOM

physics:
  g: 9.81
  h_min: 1.0e-3               # minimum depth for stability
  flux_scheme: "roe"          # 'roe' or 'lax_friedrichs'

training:
  lr: 1.0e-3
  lr_decay_patience: 300
  lr_decay_factor: 0.5
  epochs: 3000
  batch_time_steps: 4
  log_every: 100
  checkpoint_dir: "runs/pignn"
  device: "cuda"              # 'cuda' or 'cpu'
  seed: 42
  # Loss weights
  w_fvm: 0.1                  # FVM physics residual (low early so obs dominates)
  w_obs: 10.0                 # HEC-RAS observation loss (0 if results_hdf is null)
  w_smooth: 0.05              # Manning n spatial smoothness
  w_bound: 0.1                # n boundary penalty
  w_btc: 50.0                 # BTC stage observation loss (highest — our only real gauge)

# ── Gauge observations ────────────────────────────────────────
observations:
  btc_lat: 39.458307            # Butte City station latitude (NAD83/WGS84)
  btc_lon: -121.994319          # Butte City station longitude
  btc_csv: "data/BTC_stage_data_Jan2026.csv"
  btc_snap_radius_m: 5000.0   # max search radius to snap BTC to nearest mesh cell
  btc_snap_offset_easting_m: -100.0   # shift west/left to main-channel model cell
  btc_snap_offset_northing_m: 0.0

# ── Boundary conditions ───────────────────────────────────────
boundary:
  upstream_discharge_csv: "data/ord_ferry_discharge_jan2026.csv"
  downstream_stage_csv: "data/colusa_stage_jan2026.csv"
  simulation_start: "2026-01-01T00:00:00"
  dt_hours: 1.0               # hourly time steps

visualization:
  dpi: 200
  colormap_n: "RdYlGn_r"
  colormap_h: "Blues"
  colormap_vel: "plasma"
